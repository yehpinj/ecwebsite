<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南庄桂竹筍 - 職人工藝與 AI 數據</title>
    <!-- 載入外部工具：Tailwind CSS, React, Babel, Lucide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 襯線字體 Noto Serif TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Serif TC', serif; }
        
        /* 低明度、低飽和度的綠色調 */
        .moss-gradient { background: linear-gradient(135deg, #2d3e33 0%, #4a5d4e 100%); }
        .sage-bg { background-color: #f2f4f1; }
        .accent-moss { color: #3d5044; }
        .bg-moss-dark { background-color: #1e2923; }
        
        /* 輕微的水潤光澤，但保持低調 */
        .subtle-glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(45, 62, 51, 0.1);
        }
        
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: fade-in-up 1s ease-out forwards; }
        
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="sage-bg text-stone-700">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 子組件：AI 食譜助手 ---
        const RecipeAssistant = () => {
            const [selectedIngredients, setSelectedIngredients] = useState([]);
            const ingredients = ["五花肉", "排骨", "鹹蛋", "辣椒", "木耳", "雞肉"];
            
            const recipes = [
                { name: "桂竹筍悶五花肉", tags: ["經典", "厚實"], match: ["五花肉"] },
                { name: "清炒手撕桂竹筍", tags: ["爽脆", "輕盈"], match: ["辣椒", "木耳"] },
                { name: "桂竹筍排骨湯", tags: ["甘甜", "暖胃"], match: ["排骨"] },
                { name: "鹹蛋黃金桂竹筍", tags: ["濃郁", "焦香"], match: ["鹹蛋"] }
            ];

            return (
                <div className="animate-up max-w-5xl mx-auto">
                    <div className="text-center mb-16">
                        <h2 className="text-3xl font-bold accent-moss mb-4">山味食譜指南</h2>
                        <p className="text-stone-500">挑選您手邊的食材，尋找最契合的風味組合</p>
                    </div>
                    <div className="flex flex-wrap justify-center gap-3 mb-12">
                        {ingredients.map(ing => (
                            <button 
                                key={ing}
                                onClick={() => setSelectedIngredients(prev => prev.includes(ing) ? prev.filter(i => i !== ing) : [...prev, ing])}
                                className={`px-6 py-2 rounded-full border transition-all ${selectedIngredients.includes(ing) ? 'bg-stone-800 text-white border-stone-800' : 'bg-white border-stone-200 text-stone-600 hover:border-stone-400'}`}
                            >
                                {ing}
                            </button>
                        ))}
                    </div>
                    <div className="grid md:grid-cols-2 gap-6">
                        {recipes.map((r, i) => (
                            <div key={i} className="bg-white p-8 rounded-2xl flex justify-between items-center shadow-sm border border-stone-100">
                                <div>
                                    <div className="flex gap-2 mb-2">
                                        {r.tags.map(t => <span key={t} className="text-[10px] tracking-widest text-stone-400 uppercase">{t}</span>)}
                                    </div>
                                    <h3 className="text-xl font-bold text-stone-800">{r.name}</h3>
                                </div>
                                {r.match.some(m => selectedIngredients.includes(m)) && <span className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded text-xs font-bold">推薦配對</span>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 主程式組件 ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [messages, setMessages] = useState([{ role: 'ai', text: '您好，我是南庄山間助理。今日山區霧氣濃郁，桂竹筍生長狀態良好。' }]);
            const [input, setInput] = useState('');

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, isChatOpen, messages]);

            const handleSend = () => {
                if (!input.trim()) return;
                setMessages([...messages, { role: 'user', text: input }]);
                setInput('');
                setTimeout(() => setMessages(prev => [...prev, { role: 'ai', text: '這是一個很好的問題。南庄桂竹筍以低溫殺菁技術，保留最原始的高山鮮甜。' }]), 800);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* 導覽列 */}
                    <nav className="subtle-glass sticky top-0 z-50 px-8 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setActiveTab('home')}>
                                <div className="bg-moss-dark text-white w-10 h-10 rounded-lg flex items-center justify-center font-bold">南</div>
                                <span className="text-xl font-bold tracking-widest accent-moss">南庄桂竹筍</span>
                            </div>
                            <div className="hidden md:flex gap-10 text-sm font-medium tracking-widest text-stone-500 uppercase">
                                {['home', 'shop', 'ai-recipe'].map(t => (
                                    <button key={t} onClick={() => setActiveTab(t)} className={`hover:text-stone-900 transition-colors ${activeTab === t ? 'text-stone-900 border-b border-stone-900' : ''}`}>
                                        {t === 'home' ? '故事' : t === 'shop' ? '選購' : '食譜'}
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setActiveTab('shop')} className="border border-stone-800 px-6 py-2 rounded-full text-xs font-bold hover:bg-stone-800 hover:text-white transition-all uppercase tracking-widest">預購</button>
                        </div>
                    </nav>

                    {/* 主視覺區 (Hero) */}
                    <header className="moss-gradient text-stone-100 py-32 px-6 text-center relative overflow-hidden">
                        <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/pinstriped-suit.png')]"></div>
                        <div className="max-w-4xl mx-auto relative z-10 animate-up">
                            <h1 className="text-5xl md:text-7xl font-black mb-10 leading-tight tracking-tight">清晨雲霧，<br/>封存於筍尖。</h1>
                            <p className="text-lg md:text-xl text-stone-300 mb-12 max-w-2xl mx-auto leading-relaxed font-light">
                                南庄海拔 700 公尺，日夜溫差交織出最細緻的纖維。我們將這份來自大山的靜謐，完整地送抵您的餐桌。
                            </p>
                            <div className="inline-flex items-center gap-4 text-xs tracking-[0.4em] uppercase text-stone-400">
                                <span>產季預備中</span>
                                <span className="w-8 h-[1px] bg-stone-500"></span>
                                <span>2026 春季發貨</span>
                            </div>
                        </div>
                    </header>

                    {/* 內容區 */}
                    <main className="flex-grow py-24 px-6">
                        {activeTab === 'home' && (
                            <div className="max-w-7xl mx-auto space-y-48">
                                {/* Section 1: 產地敘事 */}
                                <section className="grid md:grid-cols-2 gap-20 items-center animate-up">
                                    <div className="order-2 md:order-1">
                                        <span className="text-xs font-bold tracking-[0.3em] text-stone-400 uppercase mb-4 block">Our Origin</span>
                                        <h2 className="text-4xl font-bold accent-moss mb-8">山間靈魂的細語</h2>
                                        <p className="text-stone-500 leading-relaxed mb-10 text-lg font-light">
                                            不同於大量種植的商業作物，南庄的桂竹筍在泰雅與賽夏族的守護下自然生長。這裡不施藥、不催肥，每一寸生長都依循著山的節奏。
                                        </p>
                                        <div className="flex gap-12">
                                            <div>
                                                <div className="text-3xl font-bold accent-moss">700m</div>
                                                <div className="text-[10px] text-stone-400 tracking-widest uppercase">平均生長海拔</div>
                                            </div>
                                            <div>
                                                <div className="text-3xl font-bold accent-moss">0%</div>
                                                <div className="text-[10px] text-stone-400 tracking-widest uppercase">人工農藥殘留</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="order-1 md:order-2">
                                        <div className="rounded-3xl overflow-hidden shadow-sm grayscale-[30%] hover:grayscale-0 transition-all duration-1000">
                                            <img src="https://images.unsplash.com/photo-1599420186946-7b6fb4e297f0?auto=format&fit=crop&q=80&w=800" alt="[南庄竹林]" className="w-full aspect-square object-cover" />
                                        </div>
                                    </div>
                                </section>

                                {/* Section 2: AI 數據儀表 (低飽和色系) */}
                                <section className="bg-moss-dark text-stone-200 rounded-[3rem] p-12 md:p-20 overflow-hidden relative shadow-2xl">
                                    <div className="grid md:grid-cols-2 gap-16 items-center">
                                        <div>
                                            <h2 className="text-3xl font-bold mb-6">智慧農業監控</h2>
                                            <p className="text-stone-400 mb-10 font-light leading-relaxed">
                                                我們佈署物聯網感測器以監測山間濕度與光合作用率。AI 將根據土壤數據決定最佳的採收瞬間，確保纖維在最細嫩時鎖鮮。
                                            </p>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="p-4 bg-white/5 rounded-xl border border-white/10">
                                                    <div className="text-[10px] text-stone-500 uppercase tracking-widest mb-1">濕度感測</div>
                                                    <div className="text-xl font-bold">84.2%</div>
                                                </div>
                                                <div className="p-4 bg-white/5 rounded-xl border border-white/10">
                                                    <div className="text-[10px] text-stone-500 uppercase tracking-widest mb-1">預測產季</div>
                                                    <div className="text-xl font-bold">4 月中旬</div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="h-64 flex items-end gap-2 p-6 bg-black/20 rounded-2xl border border-white/5">
                                            {[40, 65, 50, 80, 95, 70, 85, 90, 60, 45, 75, 80].map((h, i) => (
                                                <div key={i} style={{ height: `${h}%` }} className="flex-grow bg-emerald-900/40 border border-emerald-900/50 rounded-t-sm"></div>
                                            ))}
                                        </div>
                                    </div>
                                </section>

                                {/* Section 3: 職人工藝步驟 */}
                                <section className="text-center animate-up">
                                    <h2 className="text-3xl font-bold accent-moss mb-20">自然與手藝的平衡</h2>
                                    <div className="grid md:grid-cols-3 gap-16">
                                        {[
                                            { title: "朝霧採集", desc: "清晨四點，趁著露水鎖住筍尖水分時進行人工採收。" },
                                            { title: "山泉殺菁", desc: "以引自山澗的清澈山泉水大鼎煮沸，去除多餘草酸。" },
                                            { title: "真空低溫", desc: "無菌封裝，不添加任何漂白與防腐劑，保留高山原味。" }
                                        ].map((item, i) => (
                                            <div key={i}>
                                                <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-sm border border-stone-100">
                                                    <div className="text-stone-300 font-black text-2xl">{i+1}</div>
                                                </div>
                                                <h4 className="text-xl font-bold mb-4 accent-moss">{item.title}</h4>
                                                <p className="text-stone-500 text-sm leading-relaxed font-light">{item.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* Section 4: 好評引言 */}
                                <section className="py-20 border-t border-stone-200 text-center">
                                    <p className="text-2xl italic text-stone-400 max-w-3xl mx-auto leading-relaxed">
                                        「這是我吃過最接近山裡味道的桂竹筍。那種脆度與清甜，讓我想起在南庄部落度過的夏天。」
                                    </p>
                                    <div className="mt-8 text-xs font-bold tracking-widest uppercase text-stone-500">— 忠實客戶 陳女士</div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'shop' && (
                            <div className="animate-up grid md:grid-cols-3 gap-8 max-w-7xl mx-auto">
                                {[
                                    { title: "特級鮮筍 (3kg)", price: 450, tag: "預購中" },
                                    { title: "真空熟筍經濟包", price: 1280, tag: "產地直送" },
                                    { title: "原民古法筍乾", price: 220, tag: "傳統手作" }
                                ].map((item, i) => (
                                    <div key={i} className="bg-white border border-stone-100 p-8 rounded-3xl hover:shadow-xl transition-all">
                                        <div className="text-[10px] tracking-widest text-stone-400 uppercase mb-2">{item.tag}</div>
                                        <h3 className="text-xl font-bold mb-6 accent-moss">{item.title}</h3>
                                        <div className="flex justify-between items-center">
                                            <span className="text-2xl font-bold">$ {item.price}</span>
                                            <button className="bg-moss-dark text-white w-10 h-10 rounded-full flex items-center justify-center"><i data-lucide="plus" className="w-4"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'ai-recipe' && <RecipeAssistant />}
                    </main>

                    {/* 頁尾 */}
                    <footer className="bg-moss-dark text-stone-400 py-20 px-8 text-center">
                        <div className="max-w-7xl mx-auto border-t border-white/5 pt-12">
                            <div className="text-white font-bold tracking-widest text-xl mb-4">南庄桂竹筍</div>
                            <p className="text-xs tracking-widest mb-12">海拔 700m · AI 數據農法 · 職人精神</p>
                            <div className="text-[10px] opacity-30 uppercase tracking-[0.5em]">© 2026 Nanzhuang Bamboo Farmers Association</div>
                        </div>
                    </footer>

                    {/* AI 聊天 (低彩度視覺) */}
                    <div className="fixed bottom-10 right-10 z-50">
                        {isChatOpen ? (
                            <div className="w-[22rem] h-[30rem] bg-white rounded-3xl shadow-2xl border border-stone-200 flex flex-col animate-up overflow-hidden">
                                <div className="bg-moss-dark p-6 text-white flex justify-between items-center">
                                    <span className="text-sm font-bold tracking-widest">山間 AI 助理</span>
                                    <button onClick={() => setIsChatOpen(false)}><i data-lucide="x" className="w-4"></i></button>
                                </div>
                                <div className="flex-grow p-6 space-y-4 overflow-y-auto chat-scroll">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`px-4 py-3 rounded-2xl text-xs ${m.role === 'user' ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-600'}`}>
                                                {m.text}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 bg-white border-t flex gap-2">
                                    <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSend()} className="flex-grow bg-stone-50 rounded-full px-4 py-2 text-xs outline-none" placeholder="輸入您的疑問..." />
                                    <button onClick={handleSend} className="bg-moss-dark text-white p-2 rounded-full"><i data-lucide="send" className="w-4"></i></button>
                                </div>
                            </div>
                        ) : (
                            <button onClick={() => setIsChatOpen(true)} className="w-14 h-14 bg-moss-dark text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-105 transition-all">
                                <i data-lucide="message-circle" className="w-6"></i>
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
